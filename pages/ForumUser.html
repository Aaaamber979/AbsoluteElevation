<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>江城小灵通的个人空间 - 江城热线论坛</title>
    <link rel="stylesheet" href="../css/Forum.css">
    <style>
        .nav-menu {
            background: rgba(0, 0, 0, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-menu-inner {
            max-width: 980px;
            margin: 0 auto;
            padding: 8px 20px;
            display: flex;
            gap: 25px;
        }

        .nav-menu a {
            color: white;
            text-decoration: none;
            font-size: 13px;
            padding: 3px 8px;
            transition: all 0.2s;
        }

        .nav-menu a:hover {
            color: #FFD700;
            text-decoration: underline;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        /* ================= 主体内容区 ================= */
        .container {
            max-width: 980px;
            margin: 15px auto;
        }

        /* 用户信息横幅 */
        .user-banner {
            background: white;
            border: 1px solid #D0D0D0;
            padding: 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }

        .user-avatar-large {
            width: 100px;
            height: 100px;
            border: 2px solid #1E50A2;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            flex-shrink: 0;
        }

        .user-info-main {
            flex: 1;
        }

        .user-name-large {
            font-size: 20px;
            font-weight: bold;
            color: #1E50A2;
            margin-bottom: 5px;
        }

        .user-group-large {
            font-size: 13px;
            color: #ff6600;
            margin-bottom: 10px;
        }

        .user-actions {
            display: flex;
            gap: 10px;
        }

        .btn-follow,
        .btn-message {
            padding: 8px 20px;
            border: 1px solid #1a3d7a;
            border-radius: 3px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-follow {
            background: linear-gradient(to bottom, #5A96F8, #1E50A2);
            color: white;
        }

        .btn-follow:hover {
            background: linear-gradient(to bottom, #4A86E8, #0d3a7a);
        }

        .btn-message {
            background: white;
            color: #1E50A2;
        }

        .btn-message:hover {
            background: #f0f4fa;
        }

        /* 主体内容区 */
        .main-layout {
            display: flex;
            gap: 10px;
        }

        /* 左侧个人信息栏 */
        .profile-sidebar {
            width: 220px;
            background: white;
            border: 1px solid #D0D0D0;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }

        .profile-title {
            background: linear-gradient(to bottom, #4A86E8, #1E50A2);
            color: white;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: bold;
        }

        .profile-content {
            padding: 12px;
        }

        .profile-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px dotted #e0e0e0;
            font-size: 12px;
        }

        .profile-item:last-child {
            border-bottom: none;
        }

        .profile-item label {
            color: #666;
        }

        .profile-item span {
            color: #333;
            font-weight: bold;
        }

        /* 右侧内容区 */
        .content-area {
            flex: 1;
            background: white;
            border: 1px solid #D0D0D0;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }

        /* Tab导航栏 */
        .tab-nav {
            display: flex;
            border-bottom: 2px solid #1E50A2;
            background: #f8f8f8;
        }

        .tab-item {
            padding: 10px 20px;
            cursor: pointer;
            color: #666;
            border-right: 1px solid #e0e0e0;
            transition: all 0.2s;
        }

        .tab-item:last-child {
            border-right: none;
        }

        .tab-item.active {
            background: white;
            color: #1E50A2;
            font-weight: bold;
            border-bottom: 3px solid white;
            margin-bottom: -2px;
        }

        .tab-item:hover:not(.active) {
            background: #f0f4fa;
        }

        /* 帖子列表表格 */
        .post-table {
            width: 100%;
            border-collapse: collapse;
        }

        .post-table thead {
            background: linear-gradient(to bottom, #f0f4fa, #e0e8f5);
        }

        .post-table th {
            padding: 10px 12px;
            text-align: left;
            font-weight: bold;
            color: #1E50A2;
            font-size: 13px;
            border-bottom: 2px solid #1E50A2;
        }

        .post-table td {
            padding: 10px 12px;
            border-bottom: 1px dashed #e0e0e0;
            vertical-align: middle;
        }

        .post-table tr:hover {
            background: #f0f4fa;
        }

        .post-link {
            color: #1E50A2;
            text-decoration: none;
            font-size: 13px;
        }

        .post-link:hover {
            color: #cc0000;
            text-decoration: underline;
        }

        .time-text {
            color: #999;
            font-size: 11px;
        }

        .stats-text {
            color: #666;
            text-align: center;
        }

        /* 分页控件 */
        .pagination {
            padding: 15px;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .pagination a,
        .pagination span {
            display: inline-block;
            min-width: 28px;
            height: 28px;
            line-height: 28px;
            text-align: center;
            border: 1px solid #d0d0d0;
            border-radius: 2px;
            text-decoration: none;
            font-size: 12px;
            transition: all 0.2s;
        }

        .pagination a {
            background: white;
            color: #1E50A2;
        }

        .pagination a:hover {
            background: #f0f4fa;
            border-color: #4A86E8;
        }

        .pagination .current {
            background: #1E50A2;
            color: white;
            border-color: #1E50A2;
        }

        /* ================= 私信对话框样式 ================= */
        .private-message-dialog {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 600px;
            background: white;
            border: 2px solid #1E50A2;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            z-index: 10000;
            flex-direction: column;
        }

        .private-message-dialog.show {
            display: flex;
        }

        .dialog-header {
            background: linear-gradient(to bottom, #4A86E8, #1E50A2);
            color: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #0d3a7a;
        }

        .dialog-title {
            font-size: 14px;
            font-weight: bold;
        }

        .dialog-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
        }

        .dialog-close:hover {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .dialog-body {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 12px;
            display: flex;
        }

        .message.me {
            justify-content: flex-end;
        }

        .message.other {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.me .message-bubble {
            background: #4A86E8;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message.other .message-bubble {
            background: white;
            color: #333;
            border: 1px solid #ddd;
            border-bottom-left-radius: 2px;
        }

        .message-bubble.fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .typing-indicator {
            display: none;
            padding: 8px 15px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            font-size: 12px;
            text-align: center;
            animation: pulse 1.5s infinite;
        }

        .typing-indicator.show {
            display: block;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }
        }

        .dialog-footer {
            padding: 12px 15px;
            background: white;
            border-top: 1px solid #ddd;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }

        .message-input:focus {
            border-color: #4A86E8;
        }

        .message-input[readonly] {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        .send-btn {
            padding: 8px 20px;
            background: #4A86E8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            background: #1E50A2;
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Toast 提示样式 */
        .toast-hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border-radius: 25px;
            font-size: 14px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
            z-index: 99999;
            animation: toastFadeIn 0.3s ease-out;
            pointer-events: none;
        }

        @keyframes toastFadeIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* 遮罩层基础样式 */
        .page-transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            /* 纯黑背景 */

            /* 初始状态：完全透明且不可见 */
            opacity: 0;
            visibility: hidden;

            /* 核心：设置过渡动画，0.6秒平滑过渡 */
            transition: opacity 0.6s ease-in-out, visibility 0.6s ease-in-out;

            /* 确保遮罩层在最顶层 */
            z-index: 99999;

            /* 隐藏时不阻挡页面下方的点击事件 */
            pointer-events: none;
        }

        /* 激活状态：黑屏 */
        .page-transition-overlay.active {
            opacity: 1;
            visibility: visible;
            /* 显示时阻挡所有点击，防止用户在动画期间乱点 */
            pointer-events: auto;
        }
    </style>
</head>

<body>
    <!-- 页面过渡黑屏遮罩层 -->
    <div id="pageTransitionOverlay" class="page-transition-overlay"></div>
    <!-- 顶部导航 -->
    <div class="header">
        <div class="header-top">
            <div class="logo-area">
                <div class="logo">江城热线</div>
                <div class="slogan">江州人的网上家园</div>
            </div>
            <div class="user-status">
                <div class="search-box">
                    <input type="text" class="search-input" placeholder="搜索帖子...">
                    <button class="search-btn">搜索</button>
                </div>
                <div id="userStatusArea">
                    <a href="#" onclick="showLoginModal(); return false;">登录</a> |
                    <a href="#" onclick="showLoginModal(); return false;">注册</a>
                </div>
            </div>
        </div>
        <div class="nav-menu">
            <div class="nav-menu-inner">
                <a href="Forum.html">首页</a>
                <a href="#">论坛</a>
                <a href="#">交友</a>
                <a href="#">网络</a>
                <a href="#">游戏</a>
                <a href="#">商城</a>
                <a href="#">空间</a>
                <a href="#">组群</a>
            </div>
        </div>
    </div>

    <!-- 主体内容 -->
    <div class="container">
        <!-- 用户信息横幅 -->
        <div class="user-banner">
            <div class="user-avatar-large" id="userAvatar">👤</div>
            <div class="user-info-main">
                <div class="user-name-large" id="userName">加载中...</div>
                <div class="user-group-large" id="userGroup">加载中...</div>
                <div class="user-actions">
                    <button class="btn-follow" onclick="followUser()">+ 关注</button>
                    <button class="btn-message" onclick="sendMessage()">✉ 发私信</button>
                </div>
            </div>
        </div>

        <!-- 主体布局 -->
        <div class="main-layout">
            <!-- 左侧个人信息栏 -->
            <div class="profile-sidebar">
                <div class="profile-title">个人资料</div>
                <div class="profile-content" id="profileContent">
                    <div style="text-align: center; padding: 20px; color: #999;">加载中...</div>
                </div>
            </div>

            <!-- 右侧内容区 -->
            <div class="content-area">
                <!-- 帖子列表区 -->
                <div id="tabContent">
                    <table class="post-table">
                        <thead>
                            <tr>
                                <th>帖子标题</th>
                                <th style="width: 150px;">发帖时间</th>
                                <th style="width: 100px; text-align: center;">回复/查看</th>
                            </tr>
                        </thead>
                        <tbody id="postList">
                            <tr>
                                <td colspan="4" style="text-align: center; padding: 30px; color: #999;">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部版权 -->
    <div class="footer">
        <div>
            <a href="#">关于我们</a> |
            <a href="#">联系我们</a> |
            <a href="#">免责声明</a> |
            <a href="#">隐私政策</a>
        </div>
        <div style="margin-top: 10px;">
            Copyright © 2008-2030 江城热线 All Rights Reserved.
        </div>
        <div style="margin-top: 5px; color: #999;">
            ICP备案号：江ICP备08001234号
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div id="loginModal" class="login-modal">
        <div class="login-box">
            <div class="login-title">论坛登录</div>
            <button class="wechat-login-btn" onclick="wechatLogin()">
                <svg class="wechat-icon" viewBox="0 0 24 24" fill="white">
                    <path
                        d="M8.5,13.5A1.5,1.5 0 1,1 10,15A1.5,1.5 0 0,1 8.5,13.5M14.5,13.5A1.5,1.5 0 1,1 16,15A1.5,1.5 0 0,1 14.5,13.5M12,2C6.5,2 2,6 2,10.5C2,12.5 3,14.5 4.5,16L3.5,19L7,17.5C8.5,18 10,18.5 12,18.5C17.5,18.5 22,14.5 22,10C22,5.5 17.5,2 12,2M12,4C16.5,4 20,7 20,10C20,13 16.5,16 12,16C10.5,16 9,15.5 7.5,15L6,15.5L6.5,14C5.5,13 5,11.5 5,10.5C5,7 8.5,4 12,4Z" />
                </svg>
                <span id="loginBtnText">微信登录</span>
                <div class="loading-spinner" id="loginSpinner"></div>
            </button>
            <div class="login-success" id="loginSuccess">✓ 登录成功！</div>
        </div>
    </div>
    <script src="../js/util.js"></script>
    <script src="../js/Forum.js"></script>
    <script src="../data/ForumData.js"></script>
    <script>
        // 页面加载时初始化公共功能
        initForumCommon();

        // 用户数据（模拟从后端获取）
        let userData = {};
        userData = decryptData(FORUM_USERS_ENCRYPTED) || {};
        let currentUserKey = '';
        let currentTab = 'posts';

        // 加载用户资料
        function loadUserProfile() {
            // 从URL参数获取用户ID
            const urlParams = new URLSearchParams(window.location.search);
            const userKey = urlParams.get('user');

            if (!userKey) {
                alert('用户不存在');
                return;
            }

            currentUserKey = userKey;
            const user = userData[userKey];

            if (!user) {
                alert('用户不存在');
                return;
            }

            // 更新页面标题
            document.title = user.username + '的个人空间 - 江城热线论坛';

            // 更新用户横幅
            document.getElementById('userAvatar').textContent = user.avatar;
            document.getElementById('userName').textContent = user.username;
            document.getElementById('userGroup').textContent = user.userGroup;

            // 更新个人资料
            const profileHtml = Object.entries(user.profile).map(([key, value]) => {
                return `<div class="profile-item"><label>${key}:</label><span>${value}</span></div>`;
            }).join('');
            document.getElementById('profileContent').innerHTML = profileHtml;

            // 加载帖子列表
            loadPostList(user.posts);
        }

        // 页面加载时调用
        window.addEventListener('load', () => {
            loadUserProfile();
        });

        // 加载帖子列表
        function loadPostList(posts) {
            if (!posts || posts.length === 0) {
                document.getElementById('postList').innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 30px; color: #999;">暂无内容</td></tr>';
                return;
            }

            const html = posts.map(post => {
                return `
                    <tr>
                        <td><a href="${post.url}" class="post-link">${post.title}</a></td>
                        <td class="time-text">${post.publishTime}</td>
                        <td class="stats-text">${post.replies}/${post.views}</td>
                    </tr>
                `;
            }).join('');

            document.getElementById('postList').innerHTML = html;
        }

        // 切换Tab
        function switchTab(tab, element) {
            currentTab = tab;

            // 更新Tab样式
            document.querySelectorAll('.tab-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');

            // 根据Tab加载不同内容
            const user = userData[currentUserKey];
            if (!user) return;

            loadPostList(user.posts);
        }

        // 发送私信
        function sendMessage() {
            // 检查登录状态
            const forumUser = localStorage.getItem('forumUser');
            if (!forumUser) {
                // 未登录,弹出登录模块
                showLoginModal();
                return;
            }

            // 已登录,显示私信对话框
            showPrivateMessageDialog();
        }

        // 显示私信对话框
        function showPrivateMessageDialog() {
            const dialog = document.getElementById('privateMessageDialog');
            if (!dialog) {
                createPrivateMessageDialog();
            }

            const dialogElement = document.getElementById('privateMessageDialog');
            dialogElement.classList.add('show');

            // 加载对话历史
            loadChatHistory();
        }

        // 关闭私信对话框
        function closePrivateMessageDialog() {
            const dialog = document.getElementById('privateMessageDialog');
            if (dialog) {
                dialog.classList.remove('show');
            }
        }

        // 创建私信对话框
        function createPrivateMessageDialog() {
            const dialog = document.createElement('div');
            dialog.id = 'privateMessageDialog';
            dialog.className = 'private-message-dialog';
            dialog.innerHTML = `
                <div class="dialog-header">
                    <div class="dialog-title">💬 私信 - ${userData[currentUserKey]?.username || '用户'}</div>
                    <button class="dialog-close" onclick="closePrivateMessageDialog()">×</button>
                </div>
                <div class="dialog-body" id="chatBody">
                    <!-- 聊天记录将在这里显示 -->
                </div>
                <div class="typing-indicator" id="typingIndicator"></div>
                <div class="dialog-footer">
                    <div class="input-area">
                        <input type="text" class="message-input" id="messageInput" placeholder="输入消息..." readonly>
                        <button class="send-btn" id="sendBtn" onclick="handleSendMessage()">发送</button>
                    </div>
                </div>
            `;
            document.body.appendChild(dialog);
        }

        // 加载聊天历史
        function loadChatHistory() {
            const chatBody = document.getElementById('chatBody');
            const input = document.getElementById('messageInput');

            // 清空聊天记录容器
            chatBody.innerHTML = '';

            // 从localStorage读取对话历史
            const chatKey = `chat_${currentUserKey}`;
            const chatHistory = JSON.parse(localStorage.getItem(chatKey) || '[]');

            // 获取阶段标志位
            // const stage2Key = `chat_stage2_${currentUserKey}`;
            const isStage2 = localStorage.getItem('stageKey') === 'isStage2';
            const isStage3 = localStorage.getItem('stageKey') === 'isStage3';
            const isEnd = localStorage.getItem('stageKey') === 'isEnd';
            const allEnd = localStorage.getItem('stageKey') === 'allEnd';

            if (chatHistory.length === 0) {
                // 第一次打开,触发阶段一
                startStageOne();
            } else {
                // 显示历史记录
                chatHistory.forEach(msg => {
                    appendMessage(msg.sender, msg.content, false);
                });

                // 滚动到底部
                chatBody.scrollTop = chatBody.scrollHeight;

                // 检查阶段一是否完成(有2条我的消息和2条对方消息)
                const myMessages = chatHistory.filter(msg => msg.sender === 'me').length;
                const otherMessages = chatHistory.filter(msg => msg.sender === 'other').length;
                if (myMessages < 2 || otherMessages < 2) {
                    // 阶段一未完成,继续阶段一流程
                    if (myMessages === 0) {
                        // 还没发第一条消息
                        startStageOne();
                    } else if (myMessages === 1 && otherMessages === 1) {

                                setTimeout(() => {

                                    setTimeout(() => {

                                        appendMessage('other', '现在想来，他可以是一个突破口。刚刚通过你给的信息，我重点排查了过去已经关停的网站，虽然依旧找不到“玄清子”的相关信息，但是找到了叫“玄承付”的道观网站的快照。<a href="Xuan.html">玄承负</a>');

            }
            else if (isEnd) {
                input.value = '';
                hideHint();
                // 保存并显示我的消息
                appendMessage('me', message);

                // 对方回复(阶段二)
                setTimeout(() => {
                    showTypingIndicator();
                    setTimeout(() => {
                        hideTypingIndicator();
                        appendMessage('other', '谢谢你！我一定会让真相大白的，这就是我们做记者的意义。');
                        saveChatMessage('other', '谢谢你！我一定会让真相大白的，这就是我们做记者的意义。');

                                                    fadeAndRedirect();

        // 封装好的黑屏跳转函数
        function fadeAndRedirect() {
            const overlay = document.getElementById('pageTransitionOverlay');

            // 防止用户在动画期间重复点击
            if (overlay.classList.contains('active')) return;

            // 1. 添加类名，触发 CSS 黑屏动画
            overlay.classList.add('active');

            // 2. 等待动画播放完毕（600毫秒），然后执行跳转
            setTimeout(() => {
                window.location.href = 'End.html';
            }, 3000);
        }


        // 显示输入提示
        function showTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.textContent = '对方正在输入…';
                indicator.classList.add('show');
            }
        }

        // 隐藏输入提示
        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.classList.remove('show');
            }
        }

        // 显示Toast提示
        function showHint(text) {
            // 先移除旧的toast
            hideHint();

            const toast = document.createElement('div');
            toast.className = 'toast-hint';
            toast.textContent = text;
            document.body.appendChild(toast);

            // 3秒后自动消失
            setTimeout(() => {
                hideHint();
            }, 3000);
        }

        // 隐藏Toast提示
        function hideHint() {
            const existingToast = document.querySelector('.toast-hint');
            if (existingToast) {
                existingToast.remove();
            }
        }

        // 添加消息到聊天窗口
        function appendMessage(sender, content, animate = true) {
            const chatBody = document.getElementById('chatBody');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = content;

            if (animate) {
                bubble.classList.add('fade-in');
            }

            messageDiv.appendChild(bubble);
            chatBody.appendChild(messageDiv);

            // 滚动到底部
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        // 保存聊天消息到localStorage
        function saveChatMessage(sender, content) {
            const chatKey = `chat_${currentUserKey}`;
            const chatHistory = JSON.parse(localStorage.getItem(chatKey) || '[]');
            chatHistory.push({ sender, content, timestamp: Date.now() });
            localStorage.setItem(chatKey, JSON.stringify(chatHistory));
        }

        // 触发阶段二(外部调用)
        function triggerStage(stage) {
            // const stage2Key = `chat_stage2_${currentUserKey}`;
            localStorage.setItem('stageKey', stage);
        }

        // 清除当前用户的对话历史(供外部调用)
        function clearCurrentUserChat() {
            if (!currentUserKey) return;

            const chatKey = `chat_${currentUserKey}`;
            // const stage2Key = `chat_stage2_${currentUserKey}`;

            localStorage.removeItem(chatKey);
            localStorage.removeItem('stageKey');

            // 清除全局变量
            delete window._stageOneMessages;
            delete window._currentMessageIndex;
        }

        // 清除所有用户的对话历史(全局函数)
        function clearAllChatHistory() {
            const allKeys = Object.keys(localStorage);
            allKeys.forEach(key => {
                if (key.startsWith('chat_')) {
                    localStorage.removeItem(key);
                }
            });
        }

        // 暴露到全局,供其他页面调用
        window.clearCurrentUserChat = clearCurrentUserChat;
        window.clearAllChatHistory = clearAllChatHistory;
    </script>
