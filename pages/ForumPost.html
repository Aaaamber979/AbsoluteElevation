<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="../css/Forum.css">
    <style>
        .user-status a {
            color: white;
            text-decoration: none;
            margin: 0 5px;
        }

        .user-status a:hover {
            text-decoration: underline;
        }

        .nav-menu {
            background: rgba(0, 0, 0, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-menu-inner {
            max-width: 980px;
            margin: 0 auto;
            padding: 8px 20px;
            display: flex;
            gap: 25px;
        }

        .nav-menu a {
            color: white;
            text-decoration: none;
            font-size: 13px;
            padding: 3px 8px;
            transition: all 0.2s;
        }

        .nav-menu a:hover {
            color: #FFD700;
            text-decoration: underline;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        /* ================= 主体内容区 ================= */
        .container {
            max-width: 980px;
            margin: 15px auto;
        }

        /* 面包屑导航 */
        .breadcrumb {
            padding: 10px 15px;
            background: white;
            border: 1px solid #D0D0D0;
            margin-bottom: 10px;
            font-size: 12px;
            color: #666;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }

        .breadcrumb a {
            color: #1E50A2;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .breadcrumb span {
            margin: 0 5px;
            color: #999;
        }

        /* 帖子标题栏 */
        .post-header {
            background: white;
            border: 1px solid #D0D0D0;
            padding: 15px 20px;
            margin-bottom: 10px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }

        .post-title {
            font-size: 18px;
            font-weight: bold;
            color: #1E50A2;
            margin-bottom: 10px;
        }

        .post-meta {
            font-size: 11px;
            color: #999;
        }

        .post-meta span {
            margin-right: 15px;
        }

        .tag {
            display: inline-block;
            padding: 1px 5px;
            font-size: 11px;
            margin-right: 5px;
            border-radius: 2px;
            font-weight: normal;
        }

        .tag-hot {
            background: #ff9500;
            color: white;
        }

        /* 帖子主体区域 */
        .post-container {
            background: white;
            border: 1px solid #D0D0D0;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }

        /* 楼层结构 */
        .floor {
            display: flex;
            border-bottom: 1px dashed #d0d0d0;
            /* height: 200px; */
        }

        .floor:last-child {
            border-bottom: none;
        }

        /* 左侧用户信息栏 */
        .user-info-bar {
            width: 180px;
            background: #f5f5f5;
            padding: 15px;
            border-right: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .user-avatar-small {
            width: 80px;
            height: 80px;
            border: 1px solid #d0d0d0;
            margin-bottom: 10px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .username {
            font-size: 13px;
            font-weight: bold;
            color: #1E50A2;
            margin-bottom: 5px;
        }

        .user-group {
            font-size: 11px;
            color: #ff6600;
            margin-bottom: 10px;
        }

        .divider {
            height: 1px;
            background: #d0d0d0;
            margin: 10px 0;
        }

        .user-stats {
            font-size: 11px;
            color: #666;
            line-height: 1.8;
        }

        .user-stats div {
            display: flex;
            justify-content: space-between;
        }

        .user-stats label {
            color: #999;
        }

        /* 右侧正文区 */
        .post-content-area {
            flex: 1;
            background: white;
        }

        /* 楼层信息栏 */
        .floor-header {
            background: linear-gradient(to bottom, #f0f4fa, #e0e8f5);
            padding: 8px 15px;
            border-bottom: 1px solid #d0d0d0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #666;
        }

        .floor-number {
            color: #1E50A2;
            font-weight: bold;
        }

        .floor-actions {
            display: flex;
            gap: 10px;
        }

        .floor-actions button {
            background: none;
            border: none;
            color: #666;
            font-size: 11px;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 2px;
            transition: all 0.2s;
        }

        .floor-actions button:hover {
            background: rgba(30, 80, 162, 0.1);
            color: #1E50A2;
        }

        /* 正文内容区 */
        .post-body {
            padding: 20px 15px;
            font-size: 17px;
            line-height: 1.8;
            color: #333;
        }

        .post-body p {
            margin-bottom: 12px;
        }

        .post-body img {
            max-width: 100%;
            border: 1px solid #d0d0d0;
            padding: 5px;
            margin: 10px 0;
            background: white;
        }

        /* 底部操作栏 */
        .floor-footer {
            padding: 10px 15px;
            border-top: 1px solid #e8e8e8;
            display: flex;
            gap: 10px;
        }

        .btn-reply {
            padding: 6px 20px;
            background: linear-gradient(to bottom, #5A96F8, #1E50A2);
            border: 1px solid #1a3d7a;
            color: white;
            font-size: 12px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s;
        }

        .btn-reply:hover {
            background: linear-gradient(to bottom, #4A86E8, #0d3a7a);
            border-color: #0d3a7a;
        }
    </style>
</head>

<body>
    <!-- 顶部导航 -->

        <div class="header-top">

                <div class="logo">🌊 江城热线</div>

            </div>
            <div class="user-status">
                <div class="search-box">
                    <input type="text" class="search-input" placeholder="搜索帖子...">
                    <button class="search-btn">搜索</button>
                </div>
                <div id="userStatusArea">
                    <a href="#" onclick="showLoginModal(); return false;">登录</a> |
                    <a href="#" onclick="showLoginModal(); return false;">注册</a>
                </div>
            </div>
        </div>
        <div class="nav-menu">
            <div class="nav-menu-inner">
                <a href="Forum.html">首页</a>
                <a href="#">论坛</a>
                <a href="#">交友</a>
                <a href="#">网络</a>
                <a href="#">游戏</a>
                <a href="#">商城</a>
                <a href="#">空间</a>
                <a href="#">组群</a>
            </div>
        </div>
    </div>

    <!-- 主体内容 -->
    <div class="container">
        <!-- 面包屑导航 -->
        <div class="breadcrumb">
        </div>

        <!-- 帖子标题栏 -->
        <div class="post-header">
        </div>

        <!-- 帖子主体 -->
        <div class="post-container">
        </div>
    </div>

    <!-- 底部版权 -->
    <div class="footer">
        <div>
            <a href="#">关于我们</a> |
            <a href="#">联系我们</a> |
            <a href="#">免责声明</a> |

        </div>
        <div style="margin-top: 10px;">
            Copyright © 2008-2030 江城热线 All Rights Reserved.
        </div>
        <div style="margin-top: 5px; color: #999;">
            ICP备案号：江ICP备08001234号
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div id="loginModal" class="login-modal">
        <div class="login-box">
            <div class="login-title">论坛登录</div>
            <button class="wechat-login-btn" onclick="wechatLogin()">
                <svg class="wechat-icon" viewBox="0 0 24 24" fill="white">
                    <path
                        d="M8.5,13.5A1.5,1.5 0 1,1 10,15A1.5,1.5 0 0,1 8.5,13.5M14.5,13.5A1.5,1.5 0 1,1 16,15A1.5,1.5 0 0,1 14.5,13.5M12,2C6.5,2 2,6 2,10.5C2,12.5 3,14.5 4.5,16L3.5,19L7,17.5C8.5,18 10,18.5 12,18.5C17.5,18.5 22,14.5 22,10C22,5.5 17.5,2 12,2M12,4C16.5,4 20,7 20,10C20,13 16.5,16 12,16C10.5,16 9,15.5 7.5,15L6,15.5L6.5,14C5.5,13 5,11.5 5,10.5C5,7 8.5,4 12,4Z" />
                </svg>
                <span id="loginBtnText">微信登录</span>
                <div class="loading-spinner" id="loginSpinner"></div>
            </button>
            <div class="login-success" id="loginSuccess">✓ 登录成功！</div>
        </div>
    </div>

    <script src="../js/Forum.js"></script>
    <script src="../data/ForumData.js"></script>
    <script>
        // 页面加载时初始化公共功能
        initForumCommon();

        // 帖子数据（加密存储）
        let postData = {};
        postData = decryptData(FORUM_POSTS_ENCRYPTED) || {};

        // 加载帖子内容
        function loadPostContent() {

            // 从URL参数获取帖子ID
            const urlParams = new URLSearchParams(window.location.search);
            const postKey = urlParams.get('detail');


            if (!postKey) {
                document.querySelector('.post-container').innerHTML = '<div style="padding: 50px; text-align: center; color: #999;">请指定帖子ID，例如：ForumPost.html?detail=whereisyang</div>';
                return;
            }

            const post = postData[postKey];
            if (!post) {
                document.querySelector('.post-container').innerHTML = '<div style="padding: 50px; text-align: center; color: #999;">帖子不存在或已被删除 (ID: ' + postKey + ')</div>';
                return;
            }
            // 更新页面标题
            document.title = post.title + ' - 江城热线论坛';

            // 更新面包屑导航
            const breadcrumb = document.querySelector('.breadcrumb');
            breadcrumb.innerHTML = `
                <a href="Forum.html">江城热线</a>
                <span>›</span>
                <a href="#">江州都市</a>
                <span>›</span>
                <span>${post.title}</span>
            `;

            // 更新帖子标题栏
            const postHeader = document.querySelector('.post-header');
            const tagHtml = post.tag ? `<span class="tag ${post.tag.class}">${post.tag.text}</span>` : '';
            postHeader.innerHTML = `
                <div class="post-title">
                    ${tagHtml}
                    ${post.title}
                </div>
                <div class="post-meta">
                    <span>查看: ${post.views} | 回复: ${post.replies}</span>
                    <span>发表于 ${post.publishTime}</span>
                    <span>只看楼主</span>
                </div>
            `;

            // 生成主帖HTML
            const mainFloor = generateFloorHTML(post, 1, true);

            // 生成回复楼层HTML
            let replyFloors = '';
            if (post.floors && post.floors.length > 0) {
                replyFloors = post.floors.map(floor => generateFloorHTML(floor, floor.floorNumber, false)).join('');
            }

            // 更新帖子容器
            const postContainer = document.querySelector('.post-container');
            postContainer.innerHTML = mainFloor + replyFloors;
        }

        // 页面加载时调用
        window.addEventListener('load', () => {
            loadPostContent();
        });

        // 生成楼层HTML
        function generateFloorHTML(data, floorNumber, isMainPost) {
            const statsHtml = Object.entries(data.authorStats).map(([key, value]) => {
                return `<div><label>${key}:</label><span>${value}</span></div>`;
            }).join('');

            // 生成图片HTML
            let imagesHtml = '';
            if (data.images && data.images.length > 0) {
                imagesHtml = '<div class="post-images">';
                data.images.forEach(imgSrc => {
                    imagesHtml += `<img src="${imgSrc}" alt="帖子图片" style="max-width:100%;height:auto;margin:10px 0;border:1px solid #ddd;padding:5px;">`;
                });
                imagesHtml += '</div>';
            }

            return `
                <div class="floor">
                    <div class="user-info-bar">
                        <div class="user-avatar-small">${data.authorAvatar || '👤'}</div>
                        <div class="username">${data.author}</div>
                        <div class="user-group">${data.authorGroup || data.userGroup || '普通会员'}</div>
                        <div class="divider"></div>
                        <div class="user-stats">
                            ${statsHtml}
                        </div>
                    </div>
                    <div class="post-content-area">
                        <div class="floor-header">
                            <div>
                                <span class="floor-number">${floorNumber}#</span>
                                <span>发表于 ${data.publishTime}</span>
                            </div>
                            <div class="floor-actions">
                                <button>举报</button>
                            </div>
                        </div>
                        <div class="post-body">
                            ${data.content}
                            ${imagesHtml}
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>

</html>
