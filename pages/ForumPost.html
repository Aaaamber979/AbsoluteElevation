<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="../css/Forum.css">
    <style>

        .user-status a {
            color: white;
            text-decoration: none;
            margin: 0 5px;
        }

        .user-status a:hover {
            text-decoration: underline;
        }

        .nav-menu {
            background: rgba(0,0,0,0.1);
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .nav-menu-inner {
            max-width: 980px;
            margin: 0 auto;
            padding: 8px 20px;
            display: flex;
            gap: 25px;
        }

        .nav-menu a {
            color: white;
            text-decoration: none;
            font-size: 13px;
            padding: 3px 8px;
            transition: all 0.2s;
        }

        .nav-menu a:hover {
            color: #FFD700;
            text-decoration: underline;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        /* ================= 主体内容区 ================= */
        .container {
            max-width: 980px;
            margin: 15px auto;
        }

        /* 面包屑导航 */
        .breadcrumb {
            padding: 10px 15px;
            background: white;
            border: 1px solid #D0D0D0;
            margin-bottom: 10px;
            font-size: 12px;
            color: #666;
            box-shadow: 0 1px 2px rgba(0,0,0,0.08);
        }

        .breadcrumb a {
            color: #1E50A2;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .breadcrumb span {
            margin: 0 5px;
            color: #999;
        }

        /* 帖子标题栏 */
        .post-header {
            background: white;
            border: 1px solid #D0D0D0;
            padding: 15px 20px;
            margin-bottom: 10px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.08);
        }

        .post-title {
            font-size: 18px;
            font-weight: bold;
            color: #1E50A2;
            margin-bottom: 10px;
        }

        .post-meta {
            font-size: 11px;
            color: #999;
        }

        .post-meta span {
            margin-right: 15px;
        }

        .tag {
            display: inline-block;
            padding: 1px 5px;
            font-size: 11px;
            margin-right: 5px;
            border-radius: 2px;
            font-weight: normal;
        }

        .tag-hot {
            background: #ff9500;
            color: white;
        }

        /* 帖子主体区域 */
        .post-container {
            background: white;
            border: 1px solid #D0D0D0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.08);
        }

        /* 楼层结构 */
        .floor {
            display: flex;
            border-bottom: 1px dashed #d0d0d0;
            /* height: 200px; */
        }

        .floor:last-child {
            border-bottom: none;
        }

        /* 左侧用户信息栏 */
        .user-info-bar {
            width: 180px;
            background: #f5f5f5;
            padding: 15px;
            border-right: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .user-avatar-small {
            width: 80px;
            height: 80px;
            border: 1px solid #d0d0d0;
            margin-bottom: 10px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .username {
            font-size: 13px;
            font-weight: bold;
            color: #1E50A2;
            margin-bottom: 5px;
        }

        .user-group {
            font-size: 11px;
            color: #ff6600;
            margin-bottom: 10px;
        }

        .divider {
            height: 1px;
            background: #d0d0d0;
            margin: 10px 0;
        }

        .user-stats {
            font-size: 11px;
            color: #666;
            line-height: 1.8;
        }

        .user-stats div {
            display: flex;
            justify-content: space-between;
        }

        .user-stats label {
            color: #999;
        }

        /* 右侧正文区 */
        .post-content-area {
            flex: 1;
            background: white;
        }

        /* 楼层信息栏 */
        .floor-header {
            background: linear-gradient(to bottom, #f0f4fa, #e0e8f5);
            padding: 8px 15px;
            border-bottom: 1px solid #d0d0d0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #666;
        }

        .floor-number {
            color: #1E50A2;
            font-weight: bold;
        }

        .floor-actions {
            display: flex;
            gap: 10px;
        }

        .floor-actions button {
            background: none;
            border: none;
            color: #666;
            font-size: 11px;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 2px;
            transition: all 0.2s;
        }

        .floor-actions button:hover {
            background: rgba(30, 80, 162, 0.1);
            color: #1E50A2;
        }

        /* 正文内容区 */
        .post-body {
            padding: 20px 15px;
            font-size: 17px;
            line-height: 1.8;
            color: #333;
        }

        .post-body p {
            margin-bottom: 12px;
        }

        .post-body img {
            max-width: 100%;
            border: 1px solid #d0d0d0;
            padding: 5px;
            margin: 10px 0;
            background: white;
        }

        /* 底部操作栏 */
        .floor-footer {
            padding: 10px 15px;
            border-top: 1px solid #e8e8e8;
            display: flex;
            gap: 10px;
        }

        .btn-reply {
            padding: 6px 20px;
            background: linear-gradient(to bottom, #5A96F8, #1E50A2);
            border: 1px solid #1a3d7a;
            color: white;
            font-size: 12px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s;
        }

        .btn-reply:hover {
            background: linear-gradient(to bottom, #4A86E8, #0d3a7a);
            border-color: #0d3a7a;
        }
    </style>
</head>

        // 加载帖子内容
        function loadPostContent() {
            console.log('开始加载帖子内容...');
            
            // 从URL参数获取帖子ID
            const urlParams = new URLSearchParams(window.location.search);
            const postKey = urlParams.get('detail');
            
            console.log('URL参数 detail:', postKey);
            console.log('可用帖子Keys:', Object.keys(postData));
            
            if (!postKey) {
                console.log('未提供帖子ID，显示默认提示');
                document.querySelector('.post-container').innerHTML = '<div style="padding: 50px; text-align: center; color: #999;">请指定帖子ID，例如：ForumPost.html?detail=whereisyang</div>';
                return;
            }
            
            const post = postData[postKey];
            if (!post) {
                console.log('帖子不存在，key:', postKey);
                document.querySelector('.post-container').innerHTML = '<div style="padding: 50px; text-align: center; color: #999;">帖子不存在或已被删除 (ID: ' + postKey + ')</div>';
                return;
            }
            
            console.log('找到帖子:', post.title);
            
            // 更新页面标题
            document.title = post.title + ' - 江城热线论坛';
            
            // 更新面包屑导航
            const breadcrumb = document.querySelector('.breadcrumb');
            breadcrumb.innerHTML = `
                <a href="Forum.html">江城热线</a>
                <span>›</span>
                <a href="#">江州都市</a>
                <span>›</span>
                <span>${post.title}</span>
            `;
            
            // 更新帖子标题栏
            const postHeader = document.querySelector('.post-header');
            const tagHtml = post.tag ? `<span class="tag ${post.tag.class}">${post.tag.text}</span>` : '';
            postHeader.innerHTML = `
                <div class="post-title">
                    ${tagHtml}
                    ${post.title}
                </div>
                <div class="post-meta">
                    <span>查看: ${post.views} | 回复: ${post.replies}</span>
                    <span>发表于 ${post.publishTime}</span>
                    <span>只看楼主</span>
                </div>
            `;
            
            // 生成主帖HTML
            const mainFloor = generateFloorHTML(post, 1, true);
            
            // 生成回复楼层HTML
            let replyFloors = '';
            if (post.floors && post.floors.length > 0) {
                replyFloors = post.floors.map(floor => generateFloorHTML(floor, floor.floorNumber, false)).join('');
            }
            
            // 更新帖子容器
            const postContainer = document.querySelector('.post-container');
            postContainer.innerHTML = mainFloor + replyFloors;
        }

        // 页面加载时调用
        window.addEventListener('load', () => {
            loadPostContent();
        });

        // 生成楼层HTML
        function generateFloorHTML(data, floorNumber, isMainPost) {
            const statsHtml = Object.entries(data.authorStats).map(([key, value]) => {
                return `<div><label>${key}:</label><span>${value}</span></div>`;
            }).join('');
            
            // 生成图片HTML
            let imagesHtml = '';
            if (data.images && data.images.length > 0) {
                imagesHtml = '<div class="post-images">';
                data.images.forEach(imgSrc => {
                    imagesHtml += `<img src="${imgSrc}" alt="帖子图片" style="max-width:100%;height:auto;margin:10px 0;border:1px solid #ddd;padding:5px;">`;
                });
                imagesHtml += '</div>';
            }

            return `
                <div class="floor">
                    <div class="user-info-bar">
                        <div class="user-avatar-small">${data.authorAvatar || '👤'}</div>
                        <div class="username">${data.author}</div>
                        <div class="user-group">${data.authorGroup || data.userGroup || '普通会员'}</div>
                        <div class="divider"></div>
                        <div class="user-stats">
                            ${statsHtml}
                        </div>
                    </div>
                    <div class="post-content-area">
                        <div class="floor-header">
                            <div>
                                <span class="floor-number">${floorNumber}#</span>
                                <span>发表于 ${data.publishTime}</span>
                            </div>
                            <div class="floor-actions">
                                <button>举报</button>
                            </div>
                        </div>
                        <div class="post-body">
                            ${data.content}
                            ${imagesHtml}
                        </div>
                    </div>
                </div>
            `;
        }
